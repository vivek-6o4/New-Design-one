<div class="search-cases-container">
      <div class="panel-header">
        <h3>Search Cases</h3>
        <span class="collapse-icon">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </span>
      </div>
      
      <div class="form-grid">
        <!-- Row 1: Inputs -->
        <div class="form-field case-no">
          <label>Case #</label>
          <div class="input-with-icon">
            <input 
              type="text" 
              placeholder="Case #"
              [ngModel]="criteria().caseNo"
              (ngModelChange)="updateField('caseNo', $event)"
              (keydown.enter)="search()" />
            <button class="icon-btn" title="Copy to clipboard">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-field street-no">
          <label>Street Number</label>
          <input 
            type="text" 
            placeholder="1441"
            [ngModel]="criteria().streetNo"
            (ngModelChange)="updateField('streetNo', $event)"
            (keydown.enter)="search()" />
        </div>

        <div class="form-field direction">
          <label>Direction</label>
          <div class="select-wrapper">
            <select 
              [ngModel]="criteria().direction"
              (ngModelChange)="updateField('direction', $event)">
              <option value="">Select Direction</option>
              @for (dir of directions(); track dir) {
                <option [value]="dir">{{dir}}</option>
              }
            </select>
          </div>
        </div>

        <div class="form-field street-name">
          <label>Street Name</label>
          <input 
            type="text" 
            placeholder="Street Name"
            [ngModel]="criteria().streetName"
            (ngModelChange)="updateField('streetName', $event)"
            (keydown.enter)="search()" />
        </div>

        <div class="form-field type">
          <label>Type</label>
          <div class="select-wrapper">
            <select 
              [ngModel]="criteria().type"
              (ngModelChange)="updateField('type', $event)">
              <option value="">Select Type</option>
              @for (t of types(); track t) {
                <option [value]="t">{{t}}</option>
              }
            </select>
          </div>
        </div>

        <div class="form-field unit">
          <label>Unit #</label>
          <input 
            type="text" 
            placeholder="Unit"
            [ngModel]="criteria().unitNo"
            (ngModelChange)="updateField('unitNo', $event)"
            (keydown.enter)="search()" />
        </div>

        <div class="form-field apn">
          <label>APN</label>
          <input 
            type="text" 
            placeholder="APN"
            [ngModel]="criteria().apn"
            (ngModelChange)="updateField('apn', $event)"
            (keydown.enter)="search()" />
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="actions-row">
        <button class="btn btn-primary" (click)="search()">
          <span class="btn-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </span>
          Search
        </button>
        <button class="btn btn-secondary" (click)="reset()">
          <span class="btn-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path>
            </svg>
          </span>
          Reset
        </button>
      </div>
    </div>
