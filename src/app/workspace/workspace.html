<div class="workspace-layout">
      <!-- Left Column (Search Cases form takes full column height) -->
      <div class="column left-column">
        <div class="panel-wrapper search-cases-panel">
          <app-search-cases></app-search-cases>
        </div>
      </div>

      <!-- Middle Column (Search Results and Case Details) -->
      <div class="column middle-column">
        <div class="panel-wrapper search-results-panel">
          <app-search-results></app-search-results>
        </div>
        <app-case-details class="case-details-wrapper"></app-case-details>
      </div>

      <!-- Right Column (Edit Fields/Actions takes full column height) -->
      <div class="column right-column">
        <div class="panel-wrapper edit-fields-panel">
          <app-edit-fields></app-edit-fields>
        </div>
      </div>
    </div>
