<div class="workspace-layout" [class.search-collapsed]="isSearchCollapsed()">
  <div class="column left-column">
    <div class="panel-wrapper search-cases-panel">
      <app-search-cases (collapsedChange)="isSearchCollapsed.set($event)"></app-search-cases>
    </div>
  </div>

  <!-- Middle Column -->
  <div class="column middle-column">
    <div class="panel-wrapper search-results-panel" [class.is-collapsed]="isResultsCollapsed()">
      <app-search-results (collapsedChange)="isResultsCollapsed.set($event)"></app-search-results>
    </div>
    <app-case-details class="case-details-wrapper"></app-case-details>
  </div>

  <!-- Right Column -->
  <div class="column right-column">
    <div class="panel-wrapper edit-fields-panel">
      <app-edit-fields></app-edit-fields>
    </div>
  </div>
</div>
